<!DOCTYPE html>
<html>
<head>
    <title>Generate Favicon</title>
</head>
<body>
    <canvas id="canvas" width="32" height="32"></canvas>
    <br>
    <a id="download" download="favicon.ico">Download ICO</a>
    
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Draw blue rounded rectangle background
        ctx.fillStyle = '#3b82f6';
        ctx.fillRect(0, 0, 32, 32);
        
        // Draw white plus sign
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        
        // Vertical line
        ctx.beginPath();
        ctx.moveTo(16, 10);
        ctx.lineTo(16, 22);
        ctx.stroke();
        
        // Horizontal line
        ctx.beginPath();
        ctx.moveTo(10, 16);
        ctx.lineTo(22, 16);
        ctx.stroke();
        
        // Convert to downloadable ICO
        canvas.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            document.getElementById('download').href = url;
        }, 'image/png');
    </script>
</body>
</html>
